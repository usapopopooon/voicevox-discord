name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff lint
        run: ruff check bot/
      - name: Ruff format check
        run: ruff format --check bot/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r bot/requirements.txt
          pip install -r bot/requirements.dev.txt
      - name: Run tests
        env:
          DISCORD_TOKEN: "test-token-for-ci"
          VOICEVOX_URL: "http://localhost:50021"
        run: pytest bot/tests/ -v
